version: "3.9"
services:
  credvault:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_AUTH_MODE: ${APP_AUTH_MODE:-local}
      APP_AUTH_LOCAL_ADMIN_USERNAME: ${APP_AUTH_LOCAL_ADMIN_USERNAME:-admin}
      APP_AUTH_LOCAL_ADMIN_PASSWORD: ${APP_AUTH_LOCAL_ADMIN_PASSWORD:-admin1234}
      DB_URL: jdbc:postgresql://postgres:5432/credvault
      DB_USERNAME: credvault
      DB_PASSWORD: credvault
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: credvault
      POSTGRES_USER: credvault
      POSTGRES_PASSWORD: credvault
    ports:
      - "5432:5432"
