<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar usuario | Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Editar usuario</h1>
        <p class="app-subtitle">Actualiza datos del usuario, roles y estado de acceso.</p>
    </section>

    <div class="app-card p-4">
        <form th:object="${form}" th:action="@{/admin/users/{id}(id=${userId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Usuario</label>
                    <input class="form-control" type="text" th:field="*{username}">
                    <div class="text-danger small" th:errors="*{username}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" th:field="*{email}">
                    <div class="text-danger small" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" type="text" th:field="*{firstName}">
                    <div class="text-danger small" th:errors="*{firstName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input class="form-control" type="text" th:field="*{lastName}">
                    <div class="text-danger small" th:errors="*{lastName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nueva contraseña (opcional)</label>
                    <input class="form-control" type="password" th:field="*{newPassword}">
                </div>
                <div class="col-12">
                    <label class="form-label">Grupos</label>
                    <select class="form-select" multiple size="6" th:field="*{selectedGroups}">
                        <option th:each="group : ${availableGroups}" th:value="${group}" th:text="${group}"></option>
                    </select>
                    <div class="form-text">Selecciona uno o varios grupos.</div>
                </div>
                <div class="col-md-6 d-flex align-items-center gap-4 mt-md-5">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{enabled}">
                        <label class="form-check-label">Usuario activo</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{appUserRole}">
                        <label class="form-check-label">Rol APP_USER</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{adminRole}">
                        <label class="form-check-label">Rol ADMIN</label>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-4" type="submit">Guardar usuario</button>
        </form>
    </div>

    <a class="app-link d-inline-block mt-3" th:href="@{/admin/users}"><i class="bi bi-arrow-left-short"></i> Volver a gestión de usuarios</a>
</div>
</body>
</html>
