<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de usuarios | Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Gestión de usuarios</h1>
        <p class="app-subtitle">Administra usuarios de aplicación: edición, activación y eliminación.</p>
    </section>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="app-card p-4 mb-4">
        <form class="row g-2 align-items-end" th:action="@{/admin/users}" method="get">
            <div class="col-md-8">
                <label class="form-label">Buscar usuario</label>
                <input class="form-control" type="text" name="q" th:value="${q}" placeholder="nombre, apellidos, email, usuario...">
            </div>
            <input type="hidden" name="size" th:value="${size}">
            <div class="col-md-4">
                <button class="btn btn-primary me-2" type="submit">Buscar</button>
                <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Limpiar</a>
                <a class="btn btn-primary ms-2" th:if="${localMode}" th:href="@{/admin/users/new}">Nuevo usuario</a>
            </div>
        </form>
    </div>

    <div class="app-card app-table-wrap">
        <div class="table-responsive">
            <table class="table app-table align-middle">
                <thead>
                <tr>
                    <th><a class="app-link" th:href="@{/admin/users(q=${q},page=0,size=${size},sort='username',dir=${sort == 'username' ? reverseDir : 'asc'})}">Usuario</a></th>
                    <th><a class="app-link" th:href="@{/admin/users(q=${q},page=0,size=${size},sort='firstName',dir=${sort == 'firstName' ? reverseDir : 'asc'})}">Nombre</a></th>
                    <th><a class="app-link" th:href="@{/admin/users(q=${q},page=0,size=${size},sort='lastName',dir=${sort == 'lastName' ? reverseDir : 'asc'})}">Apellidos</a></th>
                    <th><a class="app-link" th:href="@{/admin/users(q=${q},page=0,size=${size},sort='email',dir=${sort == 'email' ? reverseDir : 'asc'})}">Email</a></th>
                    <th>Equipos</th>
                    <th>Roles</th>
                    <th><a class="app-link" th:href="@{/admin/users(q=${q},page=0,size=${size},sort='enabled',dir=${sort == 'enabled' ? reverseDir : 'asc'})}">Estado</a></th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${usersPage.empty}">
                    <td colspan="8" class="text-center py-4">No hay usuarios para mostrar</td>
                </tr>
                <tr th:each="user : ${usersPage.content}">
                    <td class="fw-semibold" th:text="${user.username}"></td>
                    <td th:text="${user.firstName}"></td>
                    <td th:text="${user.lastName}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge bg-light text-dark me-1" th:each="team : ${user.teams}" th:text="${team}"></span>
                    </td>
                    <td>
                        <span class="badge bg-secondary me-1" th:each="r : ${user.roles}" th:text="${r}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${user.enabled} ? 'bg-success' : 'bg-secondary'"
                              th:text="${user.enabled} ? 'Activo' : 'Inactivo'"></span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/users/{id}/edit(id=${user.id})}">Editar</a>
                        <form class="d-inline" th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-secondary" type="submit"
                                    th:text="${user.enabled} ? 'Desactivar' : 'Activar'"></button>
                        </form>
                        <form class="d-inline" th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar usuario</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${usersPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${usersPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(q=${q},page=${usersPage.number - 1},size=${size},sort=${sort},dir=${dir})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="|Página ${usersPage.number + 1} de ${usersPage.totalPages}|"></span>
            </li>
            <li class="page-item" th:classappend="${usersPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(q=${q},page=${usersPage.number + 1},size=${size},sort=${sort},dir=${dir})}">Siguiente</a>
            </li>
        </ul>
    </nav>

    <a class="app-link d-inline-block mt-3" th:href="@{/admin}"><i class="bi bi-arrow-left-short"></i> Volver a administración</a>
</div>
</body>
</html>
