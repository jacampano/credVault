<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administración | CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Administración</h1>
        <p class="app-subtitle">Configura comportamiento global y seguridad de la plataforma.</p>
    </section>

    <div class="app-card p-4">
        <h2 class="h5 mb-3">Opciones de administración</h2>
        <div class="list-group">
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:href="@{/admin/authentication}">
                Autenticación
                <i class="bi bi-chevron-right"></i>
            </a>
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:href="@{/admin/users}">
                Gestión de usuarios
                <i class="bi bi-chevron-right"></i>
            </a>
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:href="@{/admin/teams}">
                Gestión de equipos
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>

    <a class="app-link d-inline-block mt-3" th:href="@{/credentials}"><i class="bi bi-arrow-left-short"></i> Volver a credenciales</a>
</div>
</body>
</html>
