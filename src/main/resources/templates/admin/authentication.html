<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autenticación | Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Configuración de autenticación</h1>
        <p class="app-subtitle">Define el modo de login de la instancia y parámetros OAuth.</p>
    </section>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>

    <div class="alert alert-warning" th:if="${!#maps.isEmpty(envOverrides)}">
        <div class="fw-semibold">Variables de entorno activas (tienen prioridad sobre esta configuración):</div>
        <ul class="mb-0 mt-2">
            <li th:each="entry : ${envOverrides}">
                <code th:text="${entry.key}"></code>
                <span class="text-muted">=</span>
                <span th:text="${entry.value}"></span>
            </li>
        </ul>
    </div>

    <div class="app-card p-4">
        <form th:action="@{/admin/authentication}" th:object="${form}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label">Modo de autenticación</label>
                <select class="form-select" th:field="*{mode}" id="authMode">
                    <option th:value="${T(com.example.credvault.security.AuthMode).local}">local</option>
                    <option th:value="${T(com.example.credvault.security.AuthMode).oauth}">oauth</option>
                </select>
                <div class="text-danger small" th:errors="*{mode}"></div>
            </div>

            <div id="oauthSettingsBlock">
                <hr>
                <h2 class="h6 mb-3">Parámetros OAuth</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Client ID</label>
                        <input class="form-control" type="text" th:field="*{oauthClientId}">
                        <div class="text-danger small" th:errors="*{oauthClientId}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Client Secret</label>
                        <input class="form-control" type="password" th:field="*{oauthClientSecret}">
                        <div class="text-danger small" th:errors="*{oauthClientSecret}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Authorization URI</label>
                        <input class="form-control" type="url" placeholder="https://idp.example.com/oauth2/authorize" th:field="*{oauthAuthorizationUri}">
                        <div class="text-danger small" th:errors="*{oauthAuthorizationUri}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Token URI</label>
                        <input class="form-control" type="url" placeholder="https://idp.example.com/oauth2/token" th:field="*{oauthTokenUri}">
                        <div class="text-danger small" th:errors="*{oauthTokenUri}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">User Info URI</label>
                        <input class="form-control" type="url" placeholder="https://idp.example.com/userinfo" th:field="*{oauthUserInfoUri}">
                        <div class="text-danger small" th:errors="*{oauthUserInfoUri}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">User Name Attribute</label>
                        <input class="form-control" type="text" placeholder="email" th:field="*{oauthUserNameAttribute}">
                        <div class="text-danger small" th:errors="*{oauthUserNameAttribute}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Scopes (CSV)</label>
                        <input class="form-control" type="text" placeholder="openid,profile,email" th:field="*{oauthScopes}">
                        <div class="text-danger small" th:errors="*{oauthScopes}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">URL de retorno OAuth</label>
                        <input class="form-control" type="text" placeholder="{baseUrl}/oauth2/callback/{registrationId}" th:field="*{oauthRedirectUri}">
                        <div class="text-danger small" th:errors="*{oauthRedirectUri}"></div>
                        <div class="form-text">Debe coincidir con la URL configurada en el proveedor OAuth.</div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Usuarios OAuth con rol ADMIN (CSV)</label>
                        <input class="form-control" type="text" placeholder="admin@empresa.com,secops@empresa.com" th:field="*{oauthAdminUsers}">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-4" type="submit">Guardar configuración</button>
        </form>
    </div>

    <a class="app-link d-inline-block mt-3" th:href="@{/admin}"><i class="bi bi-arrow-left-short"></i> Volver a administración</a>
</div>
<script>
    (function () {
        const modeSelect = document.getElementById('authMode');
        const oauthBlock = document.getElementById('oauthSettingsBlock');
        if (!modeSelect || !oauthBlock) {
            return;
        }

        function updateOauthVisibility() {
            oauthBlock.style.display = modeSelect.value === 'oauth' ? 'block' : 'none';
        }

        modeSelect.addEventListener('change', updateOauthVisibility);
        updateOauthVisibility();
    })();
</script>
</body>
</html>
