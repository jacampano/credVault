<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Papelera | Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Papelera</h1>
        <p class="app-subtitle">Recupera credenciales eliminadas o elimínalas de forma definitiva.</p>
    </section>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="app-card app-table-wrap">
        <div class="table-responsive">
            <table class="table app-table align-middle">
                <thead>
                <tr>
                    <th>Identificador</th>
                    <th>Tipo</th>
                    <th>Equipos</th>
                    <th>Eliminada por</th>
                    <th>Fecha eliminación</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(deletedCredentials)}">
                    <td colspan="6" class="text-center py-4">No hay credenciales en la papelera</td>
                </tr>
                <tr th:each="credential : ${deletedCredentials}">
                    <td class="fw-semibold" th:text="${credential.identifier}"></td>
                    <td th:text="${credential.type}"></td>
                    <td th:text="${#strings.arrayJoin(credential.teams.toArray(), ', ')}"></td>
                    <td th:text="${credential.deletedBy}"></td>
                    <td th:text="${credential.deletedAt != null ? #temporals.format(credential.deletedAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    <td class="text-end">
                        <form class="d-inline" th:action="@{/admin/trash/{id}/restore(id=${credential.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-success" type="submit" title="Recuperar" aria-label="Recuperar">
                                <i class="bi bi-arrow-counterclockwise"></i>
                            </button>
                        </form>
                        <form class="d-inline" th:action="@{/admin/trash/{id}/delete-permanently(id=${credential.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit" title="Eliminar definitivamente" aria-label="Eliminar definitivamente">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a class="app-link d-inline-block mt-3" th:href="@{/admin}"><i class="bi bi-arrow-left-short"></i> Volver a administración</a>
</div>
</body>
</html>
