<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a sec:authorize="hasRole('ADMIN')" class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1" th:text="${mode == 'create'} ? 'Nueva credencial' : 'Editar credencial'"></h1>
        <a class="app-link" th:href="@{/credentials}"><i class="bi bi-arrow-left-short"></i> Volver a credenciales</a>
    </section>

    <div class="app-card p-4">
        <form id="credentialForm" th:object="${form}"
              th:action="${mode == 'create'} ? @{/credentials} : @{/credentials/{id}(id=${credentialId})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Identificador</label>
                    <input class="form-control" type="text" th:field="*{identifier}">
                    <div class="text-danger small" th:errors="*{identifier}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Componente</label>
                    <select id="componentSelect" class="form-select" th:field="*{componentId}">
                        <option th:value="${null}">Selecciona un componente</option>
                        <option th:each="component : ${componentOptions}"
                                th:value="${component.id}"
                                th:text="${component.name}"
                                th:attr="data-system=${component.informationSystem.name}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{componentId}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Sistema</label>
                    <input id="systemNameInput" class="form-control" type="text" th:field="*{systemName}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Entorno</label>
                    <select class="form-select" th:field="*{environmentId}">
                        <option th:value="${null}">Selecciona un entorno</option>
                        <option th:each="environment : ${environmentOptions}"
                                th:value="${environment.id}"
                                th:text="${environment.name}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{environmentId}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Creada por</label>
                    <input class="form-control" type="text" th:field="*{createdBy}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo</label>
                    <select id="credentialType" class="form-select" th:field="*{type}">
                        <option th:each="t : ${credentialTypes}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{type}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Equipos con acceso</label>
                    <select id="selectedTeams" class="form-select" multiple size="5" th:field="*{selectedTeams}">
                        <option th:each="team : ${teamOptions}" th:value="${team}" th:text="${team}"></option>
                    </select>
                    <div class="text-danger small" th:errors="*{selectedTeams}"></div>
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <div class="form-check mt-4">
                        <input id="sharedCheck" class="form-check-input" type="checkbox" th:field="*{shared}" disabled>
                        <label class="form-check-label">Compartida</label>
                    </div>
                </div>

                <div id="webTypeFields" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre usuario</label>
                        <input class="form-control" type="text" th:field="*{webUsername}">
                        <div class="text-danger small" th:errors="*{webUsername}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input id="webPasswordInput" class="form-control" type="password" th:field="*{webPassword}">
                            <button id="toggleWebPasswordBtn" class="btn btn-outline-secondary" type="button" title="Mostrar password" aria-label="Mostrar password">
                                <i id="toggleWebPasswordIcon" class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="text-danger small" th:errors="*{webPassword}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">URL</label>
                        <input class="form-control" type="text" th:field="*{webUrl}">
                    </div>
                </div>

                <div id="tokenTypeFields" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Token</label>
                        <div class="input-group">
                            <input id="tokenValueInput" class="form-control" type="password" th:field="*{tokenValue}">
                            <button id="toggleTokenBtn" class="btn btn-outline-secondary" type="button" title="Mostrar token" aria-label="Mostrar token">
                                <i id="toggleTokenIcon" class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="text-danger small" th:errors="*{tokenValue}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">URL</label>
                        <input class="form-control" type="text" th:field="*{tokenUrl}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Fecha de expiración</label>
                        <input id="tokenExpirationDateInput" class="form-control" type="date" th:field="*{tokenExpirationDate}">
                        <div class="text-danger small" th:errors="*{tokenExpirationDate}"></div>
                    </div>
                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input id="tokenNoExpiryCheck" class="form-check-input" type="checkbox" th:field="*{tokenNoExpiry}">
                            <label class="form-check-label">NO CADUCA</label>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Notas</label>
                    <textarea class="form-control" rows="4" th:field="*{notes}"></textarea>
                </div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">Guardar</button>
        </form>
    </div>
</div>
<script>
    (function () {
        const typeSelect = document.getElementById('credentialType');
        const webFields = document.getElementById('webTypeFields');
        const tokenFields = document.getElementById('tokenTypeFields');
        const selectedTeams = document.getElementById('selectedTeams');
        const sharedCheck = document.getElementById('sharedCheck');
        const tokenNoExpiryCheck = document.getElementById('tokenNoExpiryCheck');
        const tokenExpirationDateInput = document.getElementById('tokenExpirationDateInput');
        const componentSelect = document.getElementById('componentSelect');
        const systemNameInput = document.getElementById('systemNameInput');

        function toggleSecret(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (!input || !icon) {
                return;
            }
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        function applyTypeVisibility() {
            if (!typeSelect || !webFields || !tokenFields) {
                return;
            }
            const type = typeSelect.value;
            webFields.style.display = type === 'WEB_USER_PASSWORD' ? 'contents' : 'none';
            tokenFields.style.display = type === 'TOKEN' ? 'contents' : 'none';
        }

        function updateSharedByTeams() {
            if (!selectedTeams || !sharedCheck) {
                return;
            }
            const anyTeamSelected = Array.from(selectedTeams.options).some(opt => opt.selected);
            sharedCheck.checked = anyTeamSelected;
        }

        function applyTokenExpiryBehavior() {
            if (!tokenNoExpiryCheck || !tokenExpirationDateInput) {
                return;
            }
            tokenExpirationDateInput.disabled = tokenNoExpiryCheck.checked;
        }

        function updateSystemByComponent() {
            if (!componentSelect || !systemNameInput) {
                return;
            }
            const selectedOption = componentSelect.options[componentSelect.selectedIndex];
            const systemName = selectedOption ? selectedOption.getAttribute('data-system') : '';
            systemNameInput.value = systemName || '';
        }

        const toggleWebPasswordBtn = document.getElementById('toggleWebPasswordBtn');
        if (toggleWebPasswordBtn) {
            toggleWebPasswordBtn.addEventListener('click', function () {
                toggleSecret('webPasswordInput', 'toggleWebPasswordIcon');
            });
        }

        const toggleTokenBtn = document.getElementById('toggleTokenBtn');
        if (toggleTokenBtn) {
            toggleTokenBtn.addEventListener('click', function () {
                toggleSecret('tokenValueInput', 'toggleTokenIcon');
            });
        }

        if (typeSelect) {
            typeSelect.addEventListener('change', applyTypeVisibility);
        }
        if (selectedTeams) {
            selectedTeams.addEventListener('change', updateSharedByTeams);
        }
        if (tokenNoExpiryCheck) {
            tokenNoExpiryCheck.addEventListener('change', applyTokenExpiryBehavior);
        }
        if (componentSelect) {
            componentSelect.addEventListener('change', updateSystemByComponent);
        }

        applyTypeVisibility();
        updateSharedByTeams();
        applyTokenExpiryBehavior();
        updateSystemByComponent();
    })();
</script>
</body>
</html>
