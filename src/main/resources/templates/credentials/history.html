<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial de credencial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a sec:authorize="hasRole('ADMIN')" class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Historial de modificaciones</h1>
        <p class="app-subtitle">
            Credencial:
            <span class="fw-semibold" th:text="${credential.name}"></span>
        </p>
        <a class="app-link" th:href="@{/credentials}"><i class="bi bi-arrow-left-short"></i> Volver a credenciales</a>
    </section>

    <div class="app-card app-table-wrap">
        <div class="table-responsive">
            <table class="table app-table align-middle">
                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Editado por</th>
                    <th>Nombre</th>
                    <th>Equipo</th>
                    <th>Usuario</th>
                    <th>Password</th>
                    <th>URL</th>
                    <th>Compartida</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(historyEntries)}">
                    <td colspan="8" class="text-center py-4">No hay modificaciones registradas</td>
                </tr>
                <tr th:each="entry : ${historyEntries}">
                    <td th:text="${#temporals.format(entry.editedAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${entry.editedBy}"></td>
                    <td th:text="${entry.name}"></td>
                    <td th:text="${entry.team}"></td>
                    <td th:text="${entry.username}"></td>
                    <td>
                        <div class="input-group input-group-sm">
                            <input class="form-control history-password-display" type="text" value="Oculto" readonly>
                            <input class="history-password-value" type="hidden" th:value="${entry.password}">
                            <button class="btn btn-outline-secondary toggle-history-password" type="button" title="Mostrar contraseña" aria-label="Mostrar contraseña">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </td>
                    <td th:text="${entry.url}"></td>
                    <td>
                        <span class="badge" th:classappend="${entry.shared} ? 'bg-success' : 'bg-secondary'"
                              th:text="${entry.shared} ? 'SI' : 'NO'"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
    (function () {
        const rows = document.querySelectorAll('tr');
        rows.forEach(function (row) {
            const display = row.querySelector('.history-password-display');
            const value = row.querySelector('.history-password-value');
            const button = row.querySelector('.toggle-history-password');
            const icon = button ? button.querySelector('i') : null;
            if (!display || !value || !button || !icon) {
                return;
            }
            let visible = false;
            button.addEventListener('click', function () {
                visible = !visible;
                if (visible) {
                    display.value = value.value || '';
                    icon.className = 'bi bi-eye-slash';
                    button.setAttribute('title', 'Ocultar contraseña');
                    button.setAttribute('aria-label', 'Ocultar contraseña');
                } else {
                    display.value = 'Oculto';
                    icon.className = 'bi bi-eye';
                    button.setAttribute('title', 'Mostrar contraseña');
                    button.setAttribute('aria-label', 'Mostrar contraseña');
                }
            });
        });
    })();
</script>
</body>
</html>
