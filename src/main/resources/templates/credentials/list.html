<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a sec:authorize="hasRole('ADMIN')" class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <a class="btn btn-primary btn-sm" sec:authorize="hasAnyRole('APP_USER','ADMIN')" th:href="@{/credentials/new}">Nueva credencial</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Gestión de credenciales</h1>
        <p class="app-subtitle">Comparte accesos de forma segura y centralizada entre equipos.</p>
    </section>

    <div class="alert alert-success" role="alert" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

    <div class="app-card app-table-wrap">
        <div class="table-responsive">
            <table class="table app-table align-middle">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Equipo</th>
                    <th>Compartida</th>
                    <th>Actualizada</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(credentials)}">
                    <td colspan="6" class="text-center py-4">No hay credenciales</td>
                </tr>
                <tr th:each="credential : ${credentials}">
                    <td class="fw-semibold" th:text="${credential.name}"></td>
                    <td th:text="${credential.username}"></td>
                    <td th:text="${credential.team}"></td>
                    <td>
                        <span class="badge" th:classappend="${credential.shared} ? 'bg-success' : 'bg-secondary'"
                              th:text="${credential.shared} ? 'SI' : 'NO'"></span>
                    </td>
                    <td th:text="${#temporals.format(credential.updatedAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-secondary"
                           th:href="@{/credentials/{id}/history(id=${credential.id})}">Historial</a>
                        <a class="btn btn-sm btn-outline-primary"
                           th:if="${#authorization.expression('hasRole(''ADMIN'')') or #strings.equalsIgnoreCase(#authentication.name, credential.createdBy)}"
                           th:href="@{/credentials/{id}/edit(id=${credential.id})}">Editar</a>
                        <form class="d-inline"
                              th:if="${#authorization.expression('hasRole(''ADMIN'')') or #strings.equalsIgnoreCase(#authentication.name, credential.createdBy)}"
                              th:action="@{/credentials/{id}/delete(id=${credential.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
