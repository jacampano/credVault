<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil | CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a sec:authorize="hasRole('ADMIN')" class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Perfil de usuario</h1>
        <p class="app-subtitle" th:if="${editable}">Modo local: puedes editar tu nombre, apellidos y email.</p>
        <p class="app-subtitle" th:if="${!editable}">Modo OAUTH: los datos se actualizan automáticamente desde tu proveedor.</p>
    </section>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="app-card p-4">
        <form th:object="${form}" th:action="@{/profile}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre de usuario</label>
                    <input class="form-control" type="text" th:field="*{username}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre completo</label>
                    <input class="form-control" type="text" th:field="*{fullName}" th:readonly="${!editable}">
                    <div class="text-danger small" th:errors="*{fullName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" th:field="*{email}" th:readonly="${!editable}">
                    <div class="text-danger small" th:errors="*{email}"></div>
                </div>
                <div class="col-12" th:if="${!editable}">
                    <label class="form-label">Grupos GitLab</label>
                    <div class="form-control" style="min-height: 44px;" th:if="${#lists.isEmpty(oauthGroups)}">
                        Sin grupos recuperados
                    </div>
                    <div class="d-flex flex-wrap gap-2" th:if="${!#lists.isEmpty(oauthGroups)}">
                        <span class="badge text-bg-secondary" th:each="group : ${oauthGroups}" th:text="${group}"></span>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-4" type="submit" th:if="${editable}">Guardar cambios</button>
        </form>
    </div>

    <a class="app-link d-inline-block mt-3" th:href="@{/credentials}"><i class="bi bi-arrow-left-short"></i> Volver a credenciales</a>
</div>
</body>
</html>
