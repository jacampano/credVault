<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error | CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Ha ocurrido un error</h1>
        <p class="app-subtitle">La aplicación no pudo completar la solicitud.</p>
    </section>

    <div class="app-card p-4">
        <p class="mb-1"><strong>Estado:</strong> <span th:text="${status}">500</span></p>
        <p class="mb-1"><strong>Error:</strong> <span th:text="${error}">Internal Server Error</span></p>
        <p class="mb-1"><strong>Mensaje:</strong> <span th:text="${message}">Error inesperado</span></p>
        <p class="mb-3"><strong>Ruta:</strong> <span th:text="${path}">/</span></p>

        <a class="btn btn-primary" href="/">Ir al inicio</a>
    </div>
</div>
</body>
</html>
