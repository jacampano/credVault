<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calendario | CredVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-body">
<div class="container app-shell py-4 py-md-5">
    <header class="app-topbar mb-4">
        <div class="topbar-inner d-flex justify-content-between align-items-center">
            <a class="brand" th:href="@{/credentials}">CredVault</a>
            <div class="topbar-actions d-flex align-items-center gap-3">
                <a class="user-link" th:href="@{/profile}" sec:authentication="name"></a>
                <a sec:authorize="hasRole('ADMIN')" class="icon-link" th:href="@{/admin}" title="Administración" aria-label="Administración">
                    <i class="bi bi-gear-fill"></i>
                </a>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/credentials}">
                    <i class="bi bi-key-fill"></i> Credenciales
                </a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline-secondary btn-sm" type="submit">Salir</button>
                </form>
            </div>
        </div>
    </header>

    <section class="app-hero mb-4">
        <h1 class="app-title h2 mb-1">Calendario de caducidades</h1>
        <p class="app-subtitle">Visualiza expiraciones de credenciales y anticipa renovaciones.</p>
    </section>

    <div class="row g-4">
        <div class="col-12 col-xl-8">
            <div class="app-card p-3 p-md-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a class="btn btn-outline-secondary btn-sm"
                       th:href="@{/calendar(year=${previousYear},month=${previousMonth})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <h2 class="h5 mb-0" th:text="${monthLabel}"></h2>
                    <a class="btn btn-outline-secondary btn-sm"
                       th:href="@{/calendar(year=${nextYear},month=${nextMonth})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>

                <div class="calendar-grid">
                    <div class="calendar-weekday" th:each="weekday : ${weekdays}" th:text="${weekday}"></div>
                    <div th:each="day : ${calendarDays}"
                         class="calendar-day"
                         th:classappend="${!day.inCurrentMonth} ? ' calendar-day-out' : ''"
                         th:title="${day.tooltip}">
                        <span class="calendar-day-number" th:text="${day.dayNumber()}"></span>
                        <span th:if="${day.hasExpirations}"
                              class="calendar-dot"
                              th:classappend="${day.inPast} ? ' calendar-dot-past' : ''"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="app-card p-3 p-md-4 h-100">
                <h2 class="h5 mb-3">Próximas caducidades</h2>
                <div th:if="${#lists.isEmpty(upcomingExpirations)}" class="text-muted">
                    No hay credenciales próximas a caducar.
                </div>
                <div class="list-group list-group-flush" th:if="${!#lists.isEmpty(upcomingExpirations)}">
                    <div class="list-group-item px-0 d-flex justify-content-between align-items-start"
                         th:each="item : ${upcomingExpirations}">
                        <div class="me-3">
                            <div class="fw-semibold" th:text="${item.identifier}"></div>
                        </div>
                        <span class="badge text-bg-light" th:text="${item.formattedExpirationDate()}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
